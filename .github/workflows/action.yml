name: GitHub Actions Security Analysis with zizmor 🌈

on:
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private or internal repos
      actions: read # only needed for private or internal repos
    steps:
      - name: Check Disk Usage
        run: |
          df -h /
          du -sh /* 2>/dev/null | sort -hr | head -10

      - name: List all org repos with default branch
        id: list
        run: |
          ORG=elastic
          # Get nameWithOwner and default branch name; filter repos with no defaultBranchRef
          gh repo list "$ORG" --no-archived --limit 1000 --json nameWithOwner,defaultBranchRef -L 1000 --jq '.[] | select(.defaultBranchRef.name != "") | "\(.nameWithOwner)@\(.defaultBranchRef.name)"' > repos_with_ref.txt
          # For repos missing defaultBranchRef, optionally include a fallback (skip here)
          echo "Found $(wc -l < repos_with_ref.txt) repos with default branch"
          # expose as multiline output
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          cat repos_with_ref.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug print
        run: |
          echo "---- BEGIN REPOS ----"
          printf '%s\n' "$REPOS"
          echo "----  END REPOS  ----"
        env:
          REPOS: ${{ steps.list.outputs.repos }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clean Up Disk Space
        run: |
          df -h /
          
          # Remove unused tool caches (comment any required ones with #)
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          df -h /

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          config: .github/zizmor.yml
          inputs: ${{ steps.list.outputs.repos }}

